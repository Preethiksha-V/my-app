apiVersion: apps/v2
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-app-v2
        image: my-app:v2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001